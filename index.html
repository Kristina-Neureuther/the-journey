<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey - Rigid Systems & Fluid Solutions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #040814;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #5c697a;
            font-size: 0.95rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
        }

        .game-title {
            display: block;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .highlight {
            color: #ffb703;
            font-weight: bold;
        }

        .level-indicator {
            color: #00f0ff;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    Help the turtles on their journey. <span class="highlight">KLICKE & ZIEHE DIE MAUS</span>, to build golden bridges to guide them home.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
let turtlesNeeded = 5;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 7;
let gameOver = false;

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 50, h: 50};

function setup() {
    createCanvas(windowWidth, windowHeight);
    loadLevel(currentLevel);
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    if (lvl === 1) {
        startPos = { x: 150, y: 250 };
        goalPos = { x: width - 200, y: 450, w: 60, h: 60 };
        platforms = [
            { x: 50, y: 250, w: 200, h: 20 }, 
            { x: width - 250, y: 450, w: 200, h: 20 } 
        ];
    } else if (lvl === 2) {
        startPos = { x: 150, y: 200 };
        goalPos = { x: width - 200, y: 200, w: 60, h: 60 };
        platforms = [
            { x: 50, y: 200, w: 180, h: 20 }, 
            { x: width/2 - 100, y: 400, w: 200, h: 20 }, 
            { x: width - 230, y: 200, w: 180, h: 20 } 
        ];
    } else if (lvl === 3) {
        startPos = { x: 120, y: 180 };
        goalPos = { x: width / 2 - 30, y: height - 180, w: 60, h: 60 };
        platforms = [
            { x: 50, y: 180, w: 150, h: 20 }, 
            { x: width - 250, y: 300, w: 200, h: 20 }, 
            { x: 100, y: 450, w: 200, h: 20 }, 
            { x: width / 2 - 100, y: height - 120, w: 200, h: 20 } 
        ];
    }
}

function draw() {
    background(4, 8, 20, 60);
    
    stroke(45, 60, 90, 150);
    strokeWeight(2);
    fill(14, 22, 40);
    for (let p of platforms) {
        rect(p.x, p.y, p.w, p.h, 4);
    }
    
    noStroke();
    fill(0, 240, 255, 30);
    ellipse(startPos.x, startPos.y, 40);
    fill(0, 240, 255);
    ellipse(startPos.x, startPos.y, 8);
    
    stroke(0, 240, 255, 180);
    strokeWeight(2);
    fill(12, 35, 55, 200);
    rect(goalPos.x, goalPos.y, goalPos.w, goalPos.h, 6);
    
    noStroke();
    fill(0, 240, 255, 120);
    triangle(goalPos.x - 5, goalPos.y, goalPos.x + goalPos.w/2, goalPos.y - 20, goalPos.x + goalPos.w + 5, goalPos.y);
    fill(0, 240, 255, 40);
    rect(goalPos.x + goalPos.w/2 - 10, goalPos.y + goalPos.h - 25, 20, 25, 3);

    if (!gameOver && totalTurtlesSpawned < maxTurtlesToSpawn) {
        spawnTimer++;
        if (spawnTimer > 120) { 
            turtles.push({
                x: startPos.x,
                y: startPos.y - 12,
                vx: 1.2,
                vy: 0,
                size: 24,
                isGrounded: true,
                bounceTimer: random(100)
            });
            totalTurtlesSpawned++;
            spawnTimer = 0;
        }
    }

    stroke(255, 183, 3, 220); 
    strokeWeight(4);
    noFill();
    for (let linePoints of drawnLines) {
        beginShape();
        for (let pt of linePoints) {
            vertex(pt.x, pt.y);
        }
        endShape();
    }
    
    if (mouseIsPressed && currentLine.length > 0) {
        stroke(255, 183, 3, 150);
        strokeWeight(4);
        beginShape();
        for (let pt of currentLine) {
            vertex(pt.x, pt.y);
        }
        endShape();
    }

    for (let i = turtles.length - 1; i >= 0; i--) {
        let t = turtles[i];
        
        if (!t.isGrounded) {
            t.vy += 0.25; 
        } else {
            t.vy = 0;
        }
        
        t.x += t.vx;
        t.y += t.vy;
        t.isGrounded = false; 
        
        for (let p of platforms) {
            if (t.x > p.x && t.x < p.x + p.w) {
                if (t.y + 8 >= p.y && t.y - t.vy + 8 <= p.y + 6) {
                    t.y = p.y - 8;
                    t.isGrounded = true;
                }
            }
        }
        
        for (let linePoints of drawnLines) {
            for (let j = 0; j < linePoints.length - 1; j++) {
                let p1 = linePoints[j];
                let p2 = linePoints[j+1];
                
                if (t.x >= min(p1.x, p2.x) && t.x <= max(p1.x, p2.x)) {
                    let ratio = (t.x - p1.x) / (p2.x - p1.x);
                    let lineY = p1.y + ratio * (p2.y - p1.y);
                    
                    if (t.y + 8 >= lineY - 5 && t.y - t.vy + 8 <= lineY + 5) {
                        t.y = lineY - 8;
                        t.isGrounded = true;
                        
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                        if (t.vx > 0 && p2.x < p1.x) angle += PI;
                        t.vx = cos(angle) * 1.2;
                    }
                }
            }
        }
        
        if (t.isGrounded && abs(t.vx) < 0.2) {
            t.vx = 1.2; 
        }

        if (t.x > goalPos.x && t.x < goalPos.x + goalPos.w && t.y > goalPos.y && t.y < goalPos.y + goalPos.h) {
            savedCount++;
            turtles.splice(i, 1);
            continue;
        }
        
        if (t.y > height + 50) {
            turtles.splice(i, 1);
            continue;
        }

        drawTurtle(t.x, t.y, t.size, t.vx, t.bounceTimer);
        t.bounceTimer += 0.08;
    }

    checkGameStatus();
}

function drawTurtle(x, y, size, vx, timer) {
    push();
    translate(x, y);
    if (vx < 0) scale(-1, 1);
    
    let legWiggle = sin(timer * 2) * 3;
    let headWobble = cos(timer) * 1.5;

    let shellColor = color(20, 140, 115);
    let skinColor = color(0, 200, 165);

    fill(skinColor);
    noStroke();
    rect(-size/3, 4 + legWiggle, 5, 6, 2);  
    rect(size/4, 4 - legWiggle, 5, 6, 2);   
    rect(-size/5, 4 - legWiggle, 5, 6, 2);  
    rect(size/6, 4 + legWiggle, 5, 6, 2);   

    ellipse(size/2 + headWobble, -2, size * 0.35, size * 0.35);
    fill(4);
    ellipse(size/2 + 3 + headWobble, -3, 2, 2); 

    fill(shellColor);
    stroke(4, 8, 20, 150);
    strokeWeight(1);
    arc(0, 4, size, size, PI, TWO_PI); 

    stroke(0, 240, 255, 60);
    noFill();
    arc(0, 4, size * 0.6, size * 0.6, PI, TWO_PI);
    line(-size/3, 0, -size/6, -size/4);
    line(0, 4, 0, -size/2 + 4);
    line(size/3, 0, size/6, -size/4);

    pop();
}

function checkGameStatus() {
    if (savedCount >= turtlesNeeded && !gameOver) {
        if (currentLevel < totalLevels) {
            currentLevel++;
            loadLevel(currentLevel);
        } else {
            gameOver = true;
            drawWinScreen();
        }
    } else if (turtles.length === 0 && totalTurtlesSpawned >= maxTurtlesToSpawn && savedCount < turtlesNeeded) {
        loadLevel(currentLevel);
    }
}

function drawWinScreen() {
    push();
    textAlign(CENTER, CENTER);
    fill(255, 183, 3);
    textSize(24);
    text("SYSTEM EQUILIBRIUM ACHIEVED! 🐢✨", width / 2, height * 0.52);
    textSize(14);
    fill(92, 105, 122);
    text("The journey is complete. Click anywhere to reset.", width / 2, height * 0.58);
    pop();
}

function mousePressed() {
    if (gameOver) {
        currentLevel = 1;
        loadLevel(currentLevel);
        return;
    }
    currentLine = [];
    currentLine.push({x: mouseX, y: mouseY});
}

function mouseDragged() {
    if (gameOver) return;
    let lastPt = currentLine[currentLine.length - 1];
    if (!lastPt || dist(mouseX, mouseY, lastPt.x, lastPt.y) > 6) {
        currentLine.push({x: mouseX, y: mouseY});
    }
}

function mouseReleased() {
    if (gameOver) return;
    if (currentLine.length > 1) {
        drawnLines.push(currentLine);
    }
    currentLine = [];
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
