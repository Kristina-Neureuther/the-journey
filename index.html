<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey - An Atmospheric Puzzle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030613; /* Sehr dunkles Nachtblau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #8fa3bc;
            font-size: 0.95rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.8);
        }

        .game-title {
            display: block;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 5px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .highlight {
            color: #ffb703;
            font-weight: bold;
            text-shadow: 0px 0px 8px rgba(255, 183, 3, 0.6);
        }

        .level-indicator {
            color: #00f0ff;
            font-weight: bold;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    <span class="highlight">KLICKE & ZIEHE</span>, um leuchtende Brücken zu zeichnen und sie sicher zum Portal zu leiten.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
let turtlesNeeded = 5;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 7;
let gameOver = false;

// Umgebungs-Elemente
let stars = [];
let fireflies = [];
let mountains = [];

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 70, h: 80};

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    // Sterne generieren
    for(let i=0; i<150; i++) {
        stars.push({x: random(width), y: random(height*0.7), size: random(0.5, 2), alpha: random(50, 255)});
    }
    
    // Glühwürmchen generieren
    for(let i=0; i<40; i++) {
        fireflies.push({
            x: random(width), y: random(height), 
            vx: random(-0.5, 0.5), vy: random(-0.5, 0.5), 
            offset: random(100)
        });
    }

    loadLevel(currentLevel);
}

function generateMountains() {
    mountains = [];
    let yOff = 0;
    for(let x = 0; x <= width + 100; x += 50) {
        mountains.push({
            x: x,
            y1: height - 150 - noise(yOff) * 120, // Hintergrund-Berge
            y2: height - 50 - noise(yOff + 100) * 80 // Vordergrund-Berge
        });
        yOff += 0.1;
    }
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    generateMountains();
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    // Level Design mit schöneren Proportionen
    if (lvl === 1) {
        startPos = { x: 150, y: 250 };
        goalPos = { x: width - 220, y: 390, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 250, w: 220, h: 40 }, 
            { x: width - 280, y: 470, w: 240, h: 40 } 
        ];
    } else if (lvl === 2) {
        startPos = { x: 150, y: 200 };
        goalPos = { x: width - 220, y: 150, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 200, w: 200, h: 40 }, 
            { x: width/2 - 120, y: 420, w: 240, h: 40 }, 
            { x: width - 260, y: 230, w: 200, h: 40 } 
        ];
    } else if (lvl === 3) {
        startPos = { x: 120, y: 180 };
        goalPos = { x: width / 2 - 35, y: height - 200, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 180, w: 180, h: 40 }, 
            { x: width - 280, y: 320, w: 220, h: 40 }, 
            { x: 80, y: 480, w: 220, h: 40 }, 
            { x: width / 2 - 120, y: height - 120, w: 240, h: 40 } 
        ];
    }
}

function draw() {
    // Mystischer Himmels-Farbverlauf
    let gradient = drawingContext.createLinearGradient(0, 0, 0, height);
    gradient.addColorStop(0, "#030613");
    gradient.addColorStop(1, "#0a1835");
    drawingContext.fillStyle = gradient;
    drawingContext.fillRect(0, 0, width, height);

    // Sterne zeichnen
    noStroke();
    for(let s of stars) {
        fill(255, 255, 255, s.alpha + sin(frameCount * 0.05 + s.size) * 50);
        ellipse(s.x, s.y, s.size);
    }

    // Berge zeichnen
    fill(8, 15, 30);
    beginShape();
    vertex(0, height);
    for(let m of mountains) vertex(m.x, m.y1);
    vertex(width, height);
    endShape(CLOSE);

    fill(12, 22, 45);
    beginShape();
    vertex(0, height);
    for(let m of mountains) vertex(m.x, m.y2);
    vertex(width, height);
    endShape(CLOSE);

    // Glühwürmchen
    for(let f of fireflies) {
        f.x += f.vx + sin(frameCount * 0.02 + f.offset) * 0.5;
        f.y += f.vy + cos(frameCount * 0.015 + f.offset) * 0.3;
        if(f.x < 0) f.x = width; if(f.x > width) f.x = 0;
        if(f.y < 0) f.y = height; if(f.y > height) f.y = 0;
        
        fill(0, 255, 200, 150 + sin(frameCount * 0.05 + f.offset) * 100);
        ellipse(f.x, f.y, 3);
    }

    // --- SCHWEBENDE INSELN (Plattformen) ---
    for (let p of platforms) {
        // Felsboden
        fill(20, 28, 45);
        stroke(35, 45, 65);
        strokeWeight(2);
        rect(p.x, p.y, p.w, p.h, 8, 8, 20, 20);
        
        // Leuchtendes Moos/Gras oben drauf
        fill(10, 150, 120);
        noStroke();
        rect(p.x, p.y, p.w, 12, 8, 8, 0, 0);
        
        // Kleine hängende Ranken
        stroke(10, 150, 120);
        strokeWeight(3);
        line(p.x + 20, p.y + 12, p.x + 20, p.y + 25);
        line(p.x + p.w - 30, p.y + 12, p.x + p.w - 30, p.y + 35);
    }
    
    // --- START-PORTAL ---
    drawingContext.shadowBlur = 20;
    drawingContext.shadowColor = color(0, 240, 255);
    noFill();
    stroke(0, 240, 255, 180);
    strokeWeight(3);
    ellipse(startPos.x, startPos.y - 10, 40, 60);
    fill(0, 240, 255, 40);
    noStroke();
    ellipse(startPos.x, startPos.y - 10, 30, 50);
    drawingContext.shadowBlur = 0; // Glow zurücksetzen

    // --- ZIEL-TEMPEL (Portal) ---
    push();
    translate(goalPos.x, goalPos.y);
    // Glow Effekt für Portal
    drawingContext.shadowBlur = 25;
    drawingContext.shadowColor = color(0, 255, 150);
    
    // Portal-Energie
    fill(0, 255, 150, 60 + sin(frameCount * 0.1) * 30);
    noStroke();
    rect(10, 10, goalPos.w - 20, goalPos.h - 10, 40, 40, 0, 0);
    
    drawingContext.shadowBlur = 0;
    
    // Tempel-Bogen (Stein)
    fill(30, 40, 60);
    stroke(50, 70, 90);
    strokeWeight(2);
    rect(0, 0, 15, goalPos.h); // Linke Säule
    rect(goalPos.w - 15, 0, 15, goalPos.h); // Rechte Säule
    arc(goalPos.w/2, 10, goalPos.w, 40, PI, TWO_PI); // Bogen oben
    pop();

    // --- SPAWN LOGIK ---
    if (!gameOver && totalTurtlesSpawned < maxTurtlesToSpawn) {
        spawnTimer++;
        if (spawnTimer > 110) { 
            turtles.push({
                x: startPos.x,
                y: startPos.y - 12,
                vx: 1.2,
                vy: 0,
                size: 20,
                isGrounded: true,
                bounceTimer: random(100)
            });
            totalTurtlesSpawned++;
            spawnTimer = 0;
        }
    }

    // --- GEZEICHNETE GOLDENE BRÜCKEN (Mit Glow) ---
    drawingContext.shadowBlur = 15;
    drawingContext.shadowColor = color(255, 183, 3);
    stroke(255, 183, 3, 230); 
    strokeWeight(5);
    strokeJoin(ROUND);
    noFill();
    for (let linePoints of drawnLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }
    
    if (mouseIsPressed && currentLine.length > 0) {
        stroke(255, 200, 50, 200);
        beginShape();
        for (let pt of currentLine) vertex(pt.x, pt.y);
        endShape();
    }
    drawingContext.shadowBlur = 0;

    // --- SCHILDKRÖTEN LOGIK ---
    for (let i = turtles.length - 1; i >= 0; i--) {
        let t = turtles[i];
        
        if (!t.isGrounded) t.vy += 0.25; 
        else t.vy = 0;
        
        t.x += t.vx;
        t.y += t.vy;
        t.isGrounded = false; 
        
        // Kollision: Inseln
        for (let p of platforms) {
            if (t.x > p.x && t.x < p.x + p.w) {
                if (t.y + 8 >= p.y && t.y - t.vy + 8 <= p.y + 10) {
                    t.y = p.y - 8;
                    t.isGrounded = true;
                }
            }
        }
        
        // Kollision: Goldene Brücken
        for (let linePoints of drawnLines) {
            for (let j = 0; j < linePoints.length - 1; j++) {
                let p1 = linePoints[j];
                let p2 = linePoints[j+1];
                
                if (t.x >= min(p1.x, p2.x) && t.x <= max(p1.x, p2.x)) {
                    let ratio = (t.x - p1.x) / (p2.x - p1.x);
                    let lineY = p1.y + ratio * (p2.y - p1.y);
                    
                    if (t.y + 8 >= lineY - 8 && t.y - t.vy + 8 <= lineY + 8) {
                        t.y = lineY - 8;
                        t.isGrounded = true;
                        
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                        if (t.vx > 0 && p2.x < p1.x) angle += PI;
                        t.vx = cos(angle) * 1.3;
                    }
                }
            }
        }
        
        if (t.isGrounded && abs(t.vx) < 0.2) t.vx = 1.2; 

        // Ziel-Erkennung
        if (t.x > goalPos.x && t.x < goalPos.x + goalPos.w && t.y > goalPos.y && t.y < goalPos.y + goalPos.h) {
            savedCount++;
            turtles.splice(i, 1);
            continue;
        }
        
        if (t.y > height + 50) {
            turtles.splice(i, 1);
            continue;
        }

        drawTurtle(t.x, t.y, t.size, t.vx, t.bounceTimer);
        t.bounceTimer += 0.1;
    }

    checkGameStatus();
}

    translate(x, y);
    if (vx < 0) scale(-1, 1);
    
    let legWiggle = sin(timer * 2.5) * 3;
