<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey - A Sunny Puzzle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB; /* Helles Himmelblau als Fallback */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #2c3e50; /* Dunkles Schiefergrau für Lesbarkeit */
            font-size: 0.95rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0px 2px 8px rgba(255, 255, 255, 0.9); /* Weißer Schatten für Kontrast */
        }

        .game-title {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: #1a2b4c; /* Kräftiges Marineblau */
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .highlight {
            color: #d35400; /* Kräftiges, warmes Orange */
            font-weight: bold;
        }

        .level-indicator {
            color: #2980b9; /* Helles Blau */
            font-weight: bold;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    <span class="highlight">KLICKE & ZIEHE</span>, um Brücken zu zeichnen und sie sicher ins Ziel zu leiten.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
let turtlesNeeded = 5;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 7;
let gameOver = false;

// Neue Sommer-Umgebungs-Elemente
let clouds = [];
let hills = [];

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 70, h: 80};

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    // Wolken generieren
    for(let i = 0; i < 8; i++) {
        clouds.push({
            x: random(width), 
            y: random(height * 0.4), 
            size: random(50, 120), 
            speed: random(0.1, 0.3)
        });
    }

    loadLevel(currentLevel);
}

function generateHills() {
    hills = [];
    let yOff = 0;
    for(let x = 0; x <= width + 100; x += 50) {
        hills.push({
            x: x,
            y1: height - 150 - noise(yOff) * 100, // Hintergrund-Hügel
            y2: height - 50 - noise(yOff + 100) * 60 // Vordergrund-Hügel
        });
        yOff += 0.08; // Weichere Kurven für die Sommerhügel
    }
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    generateHills();
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    // Level Design 
    if (lvl === 1) {
        startPos = { x: 150, y: 250 };
        goalPos = { x: width - 220, y: 390, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 250, w: 220, h: 40 }, 
            { x: width - 280, y: 470, w: 240, h: 40 } 
        ];
    } else if (lvl === 2) {
        startPos = { x: 150, y: 200 };
        goalPos = { x: width - 220, y: 150, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 200, w: 200, h: 40 }, 
            { x: width/2 - 120, y: 420, w: 240, h: 40 }, 
            { x: width - 260, y: 230, w: 200, h: 40 } 
        ];
    } else if (lvl === 3) {
        startPos = { x: 120, y: 180 };
        goalPos = { x: width / 2 - 35, y: height - 200, w: 70, h: 80 };
        platforms = [
            { x: 40, y: 180, w: 180, h: 40 }, 
            { x: width - 280, y: 320, w: 220, h: 40 }, 
            { x: 80, y: 480, w: 220, h: 40 }, 
            { x: width / 2 - 120, y: height - 120, w: 240, h: 40 } 
        ];
    }
}

function draw() {
    // 1. Strahlend blauer Sommerhimmel
    let gradient = drawingContext.createLinearGradient(0, 0, 0, height);
    gradient.addColorStop(0, "#4facfe"); // Sattes Himmelblau oben
    gradient.addColorStop(1, "#e0f6ff"); // Helles Lichtblau unten
    drawingContext.fillStyle = gradient;
    drawingContext.fillRect(0, 0, width, height);

    // 2. Die Sonne!
    push();
    drawingContext.shadowBlur = 50;
    drawingContext.shadowColor = color(255, 220, 50);
    fill(255, 230, 80);
    noStroke();
    ellipse(width - 120, 120, 100, 100);
    drawingContext.shadowBlur = 0;
    pop();

    // 3. Flauschige Wolken
    noStroke();
    fill(255, 255, 255, 220);
    for(let c of clouds) {
        c.x -= c.speed;
        if(c.x < -c.size * 2) c.x = width + c.size;
        
        // Wolkenform aus überlappenden Kreisen
        ellipse(c.x, c.y, c.size, c.size * 0.6);
        ellipse(c.x - c.size * 0.3, c.y + c.size * 0.1, c.size * 0.7, c.size * 0.5);
        ellipse(c.x + c.size * 0.3, c.y + c.size * 0.1, c.size * 0.6, c.size * 0.4);
    }

    // 4. Saftig grüne Hügel
    fill(100, 200, 90); // Hintergrund-Hügel (etwas blasser)
    beginShape();
    vertex(0, height);
    for(let h of hills) vertex(h.x, h.y1);
    vertex(width, height);
    endShape(CLOSE);

    fill(130, 225, 100); // Vordergrund-Hügel (knallig)
    beginShape();
    vertex(0, height);
    for(let h of hills) vertex(h.x, h.y2);
    vertex(width, height);
    endShape(CLOSE);

    // --- FREBEND INSELN (Erde & Gras) ---
    for (let p of platforms) {
        // Brauner Erdboden
        fill(140, 90, 60);
        stroke(110, 65, 40);
        strokeWeight(2);
        rect(p.x, p.y, p.w, p.h, 5, 5, 15, 15);
        
        // Sommerliches Gras oben drauf
        fill(110, 210, 70);
        noStroke();
        rect(p.x, p.y - 2, p.w, 14, 5, 5, 0, 0);
        
        // Grasfransen
        stroke(110, 210, 70);
        strokeWeight(4);
        line(p.x + 15, p.y + 12, p.x + 15, p.y + 22);
        line(p.x + 35, p.y + 12, p.x + 35, p.y + 18);
        line(p.x + p.w - 25, p.y + 12, p.x + p.w - 25, p.y + 25);
    }
    
    // --- START-PORTAL (Warmes Licht) ---
    drawingContext.shadowBlur = 15;
    drawingContext.shadowColor = color(255, 200, 50);
    noFill();
    stroke(255, 220, 100, 200);
    strokeWeight(4);
    ellipse(startPos.x, startPos.y - 10, 40, 60);
    fill(255, 220, 100, 60);
    noStroke();
    ellipse(startPos.x, startPos.y - 10, 30, 50);
    drawingContext.shadowBlur = 0; 

    // --- ZIEL-HAUS (Weißer Stein mit warmem Glühen) ---
    push();
    translate(goalPos.x, goalPos.y);
    
    // Glow Effekt für Portal-Inneres
    drawingContext.shadowBlur = 20;
    drawingContext.shadowColor = color(255, 255, 255);
    fill(255, 250, 220, 150 + sin(frameCount * 0.1) * 50);
    noStroke();
    rect(10, 10, goalPos.w - 20, goalPos.h - 10, 40, 40, 0, 0);
    drawingContext.shadowBlur = 0;
    
    // Torbogen aus hellem Sandstein
    fill(240, 235, 220);
    stroke(180, 175, 160);
    strokeWeight(2);
    rect(0, 0, 15, goalPos.h); 
    rect(goalPos.w - 15, 0, 15, goalPos.h); 
    arc(goalPos.w/2, 10, goalPos.w, 40, PI, TWO_PI); 
    pop();

    // --- SPAWN LOGIK ---
    if (!gameOver && totalTurtlesSpawned < maxTurtlesToSpawn) {
        spawnTimer++;
        if (spawnTimer > 110) { 
            turtles.push({
                x: startPos.x,
                y: startPos.y - 12,
                vx: 1.2,
                vy: 0,
                size: 20,
                isGrounded: true,
                bounceTimer: random(100)
            });
            totalTurtlesSpawned++;
            spawnTimer = 0;
        }
    }

    // --- GEZEICHNETE GOLDENE BRÜCKEN ---
    // Etwas kräftigerer Rand, damit man sie vor dem hellen Himmel gut sieht
    drawingContext.shadowBlur = 8;
    drawingContext.shadowColor = color(200, 100, 0);
    stroke(255, 170, 0); 
    strokeWeight(6);
    strokeJoin(ROUND);
    noFill();
    for (let linePoints of drawnLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }
    
    if (mouseIsPressed && currentLine.length > 0) {
        stroke(255, 200, 50, 200);
        beginShape();
        for (let pt of currentLine) vertex(pt.x, pt.y);
        endShape();
    }
    drawingContext.shadowBlur = 0;

    // --- SCHILDKRÖTEN LOGIK ---
    for (let i = turtles.length - 1; i >= 0; i--) {
        let t = turtles[i];
        
        if (!t.isGrounded) t.vy += 0.25; 
        else t.vy = 0;
        
        t.x += t.vx;
        t.y += t.vy;
        t.isGrounded = false; 
        
        for (let p of platforms) {
            if (t.x > p.x && t.x < p.x + p.w) {
                if (t.y + 8 >= p.y && t.y - t.vy + 8 <= p.y + 10) {
                    t.y = p.y - 8;
                    t.isGrounded = true;
                }
            }
        }
        
        for (let linePoints of drawnLines) {
            for (let j = 0; j < linePoints.length - 1; j++) {
                let p1 = linePoints[j];
                let p2 = linePoints[j+1];
                
                if (t.x >= min(p1.x, p2.x) && t.x <= max(p1.x, p2.x)) {
                    let ratio = (t.x - p1.x) / (p2.x - p1.x);
                    let lineY = p1.y + ratio * (p2.y - p1.y);
                    
                    if (t.y + 8 >= lineY - 8 && t.y - t.vy + 8 <= lineY + 8) {
                        t.y = lineY - 8;
                        t.isGrounded = true;
                        
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                        if (t.vx > 0 && p2.x < p1.x) angle += PI;
                        t.vx = cos(angle) * 1.3;
                    }
                }
            }
        }
        
        if (t.isGrounded && abs(t.vx) < 0.2) t.vx = 1.2; 

        if (t.x > goalPos.x && t.x < goalPos.x + goalPos.w && t.y > goalPos.y && t.y < goalPos.y + goalPos.h) {
            savedCount++;
            turtles.splice(i, 1);
            continue;
        }
        
        if (t.y > height + 50) {
            turtles.splice(i, 1);
            continue;
        }

        drawTurtle(t.x, t.y, t.size, t.vx, t.bounceTimer);
        t.bounceTimer += 0.1;
    }

    checkGameStatus();
}

function drawTurtle(x, y, size, vx, timer) {
    push();
    translate(x, y);
    if (vx < 0) scale(-1, 1);
    
    let legWiggle = sin(timer * 2.5) * 3;
    let headWobble = cos(timer * 1.5) * 1.5;

    // Etwas satteres Grün für den Sommer
    let shellColor = color(34, 139, 34);
    let skinColor = color(152, 251, 152);

    fill(skinColor);
    stroke(20, 100, 20); // Dunkle Umrandung für besseren Kontrast
    strokeWeight(1);
    rect(-size/3, 4 + legWiggle, 4, 5, 2);  
    rect(size/4, 4 - legWiggle, 4, 5, 2);   
    rect(-size/5, 4 - legWiggle, 4, 5, 2);  
    rect(size/6, 4 + legWiggle, 4, 5, 2);   

    ellipse(size/2 + headWobble, -2, size * 0.4, size * 0.35);
    fill(20);
    noStroke();
    ellipse(size/2 + 3 + headWobble, -3, 2.5, 2.5); 

    fill(shellColor);
    stroke(20, 80, 20);
    strokeWeight(1.5);
    arc(0, 4, size, size, PI, TWO_PI); 

    stroke(100, 200, 100, 150);
    noFill();
    arc(0, 4, size * 0.6, size * 0.6, PI, TWO_PI);
    line(-size/4, 0, -size/8, -size/4);
    line(size/4, 0, size/8, -size/4);

    pop();
}

function checkGameStatus() {
    if (savedCount >= turtlesNeeded && !gameOver) {
        if (currentLevel < totalLevels) {
            currentLevel++;
            loadLevel(currentLevel);
        } else {
            gameOver = true;
            drawWinScreen();
        }
    } else if (turtles.length === 0 && totalTurtlesSpawned >= maxTurtlesToSpawn && savedCount < turtlesNeeded) {
        loadLevel(currentLevel);
    }
}

function drawWinScreen() {
    push();
    textAlign(CENTER, CENTER);
    
    // Schöner Textschatten für den Sieg-Bildschirm
    drawingContext.shadowBlur = 10;
    drawingContext.shadowColor = color(255, 255, 255);
    
    fill(230, 100, 0); // Kräftiges Orange
    textSize(32);
    text("DIE REISE IST VOLLENDET! ☀️🐢", width / 2, height * 0.45);
    
    drawingContext.shadowBlur = 0;
    textSize(18);
    fill(40, 60, 90);
    text("Alle Schildkröten haben durch deine Brücken ihren Weg gefunden.", width / 2, height * 0.52);
    text("Klicke irgendwo hin, um von vorn zu beginnen.", width / 2, height * 0.58);
    pop();
}

function mousePressed() {
    if (gameOver) {
        currentLevel = 1;
        loadLevel(currentLevel);
        return;
    }
    currentLine = [];
    currentLine.push({x: mouseX, y: mouseY});
}

function mouseDragged() {
    if (gameOver) return;
    let lastPt = currentLine[currentLine.length - 1];
    if (!lastPt || dist(mouseX, mouseY, lastPt.x, lastPt.y) > 8) {
        currentLine.push({x: mouseX, y: mouseY});
    }
}

function mouseReleased() {
    if (gameOver) return;
    if (currentLine.length > 1) {
        drawnLines.push(currentLine);
    }
    currentLine = [];
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    generateHills();
}
</script>

</body>
</html>
