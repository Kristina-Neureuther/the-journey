<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Journey - A Summer Adventure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Verhindert das Scrollen des Browsers beim Zeichnen */
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #2c3e50;
            font-size: 0.85rem;
            letter-spacing: 1px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0px 2px 10px rgba(255, 255, 255, 0.9);
            padding: 0 10px;
            box-sizing: border-box;
        }

        .game-title {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #1a2b4c;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .highlight {
            color: #d35400;
            font-weight: bold;
            text-shadow: 0px 0px 5px rgba(255, 200, 0, 0.5);
        }

        .level-indicator {
            color: #0066cc;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        /* Desktop-Optimierung für größere Bildschirme */
        @media (min-width: 600px) {
            .ui-container { font-size: 1rem; line-height: 1.6; }
            .game-title { font-size: 2rem; letter-spacing: 6px; margin-bottom: 4px; }
            .level-indicator { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<div class="ui-container" id="mainUI">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    <span class="highlight">KLICKE & ZIEHE</span> / Wische, um goldene Brücken zu bauen. Bring die Schildkröte ans Ziel.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
let turtlesNeeded = 1;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 1;
let gameOver = false;

// Umgebungs-Elemente
let clouds = [];
let hillsBackground = [];
let hillsForeground = [];
let particles = [];
let sunPos;

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 75, h: 85};

function setup() {
    createCanvas(windowWidth, windowHeight);
    sunPos = { x: width - 100, y: 100 };
    
    for(let i = 0; i < 5; i++) {
        clouds.push({
            x: random(width), y: random(height * 0.3), 
            size: random(60, 120), speed: random(0.1, 0.2)
        });
    }
    
    for(let i = 0; i < 25; i++) {
        particles.push({
            x: random(width), y: random(height),
            size: random(2, 4), speed: random(0.4, 1.2), angle: random(TWO_PI)
        });
    }

    loadLevel(currentLevel);
}

function generateHills() {
    hillsBackground = [];
    hillsForeground = [];
    let yOff1 = 0;
    let yOff2 = 100;
    for(let x = 0; x <= width + 100; x += 40) {
        hillsBackground.push({ x: x, y: height - 100 - noise(yOff1) * 100 });
        hillsForeground.push({ x: x, y: height - 40 - noise(yOff2) * 60 });
        yOff1 += 0.05; 
        yOff2 += 0.06;
    }
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    document.getElementById("mainUI").classList.remove("hidden");
    generateHills();
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    // Proportionale Skalierung der Breiten-Abstände für Smartphones
    let edgeOffset = width > 600 ? 150 : 60;
    let goalOffset = width > 600 ? 240 : 120;

    if (lvl === 1) {
        startPos = { x: edgeOffset, y: height * 0.35 };
        goalPos = { x: width - goalOffset, y: height * 0.6, w: 65, h: 75 };
        platforms = [
            { x: edgeOffset - 80, y: height * 0.35, w: 160, h: 40 }, 
            { x: width - goalOffset - 40, y: height * 0.6 + 75, w: 150, h: 40 } 
        ];
    } else if (lvl === 2) {
        startPos = { x: edgeOffset, y: height * 0.28 };
        goalPos = { x: width - goalOffset, y: height * 0.22, w: 65, h: 75 };
        platforms = [
            { x: edgeOffset - 80, y: height * 0.28, w: 140, h: 40 }, 
            { x: width / 2 - 75, y: height * 0.65, w: 150, h: 40 }, 
            { x: width - goalOffset - 30, y: height * 0.22 + 75, w: 130, h: 40 } 
        ];
    } else if (lvl === 3) {
        startPos = { x: edgeOffset, y: height * 0.25 };
        goalPos = { x: width / 2 - 32, y: height - 170, w: 65, h: 75 };
        platforms = [
            { x: edgeOffset - 80, y: height * 0.25, w: 130, h: 40 }, 
            { x: width - edgeOffset - 60, y: height * 0.45, w: 130, h: 40 }, 
            { x: edgeOffset - 40, y: height * 0.68, w: 130, h: 40 }, 
            { x: width / 2 - 80, y: height - 100, w: 160, h: 40 } 
        ];
    }
}

function drawGradientShape(points, colorTop, colorBottom) {
    let grad = drawingContext.createLinearGradient(0, height - 200, 0, height);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBottom);
    drawingContext.fillStyle = grad;
    
    beginShape();
    vertex(0, height);
    for(let p of points) vertex(p.x, p.y);
    vertex(width, height);
    endShape(CLOSE);
}

function draw() {
    let skyGrad = drawingContext.createLinearGradient(0, 0, 0, height);
    skyGrad.addColorStop(0, "#3a9ced"); 
    skyGrad.addColorStop(1, "#cce9ff"); 
    drawingContext.fillStyle = skyGrad;
    drawingContext.fillRect(0, 0, width, height);

    if (gameOver) {
        drawWinScreen();
        return; 
    }

    // Sonne
    noStroke();
    for (let i = 0; i < 4; i++) {
        fill(255, 240, 150, 12 - i * 2);
        arc(sunPos.x, sunPos.y, 500 + i * 300, 500 + i * 300, PI/2, PI);
    }
    fill(255, 240, 120);
    ellipse(sunPos.x, sunPos.y, 90, 90);

    // Wolken
    fill(255, 255, 255, 230);
    for(let c of clouds) {
        c.x -= c.speed;
        if(c.x < -c.size * 2) c.x = width + c.size;
        ellipse(c.x, c.y, c.size, c.size * 0.5);
        ellipse(c.x - c.size * 0.3, c.y - c.size * 0.1, c.size * 0.6, c.size * 0.4);
    }

    // Hügel
    drawGradientShape(hillsBackground, "#6dc971", "#429345");
    drawGradientShape(hillsForeground, "#88e053", "#51a31d");

    // Wasser
    fill(0, 150, 255, 120);
    rect(0, height - 20, width, 20);

    // Pollen
    fill(255, 255, 255, 180);
    for(let p of particles) {
        p.x += cos(p.angle) * p.speed - 0.3;
        p.y += sin(p.angle) * p.speed + 0.4;
        if(p.y > height) { p.y = -10; p.x = random(width); }
        ellipse(p.x, p.y, p.size);
    }

    // Plattformen
    for (let p of platforms) {
        fill(120, 80, 50); 
        stroke(90, 50, 30);
        strokeWeight(2);
        rect(p.x, p.y, p.w, p.h, 6);
        
        fill(100, 200, 60);
        noStroke();
        rect(p.x, p.y - 2, p.w, 10, 6, 6, 0, 0);
    }
    
    // Start-Portal
    noFill();
    stroke(255, 220, 50, 220);
    strokeWeight(4);
    ellipse(startPos.x, startPos.y - 12, 35, 50);

    // Ziel-Haus
    push();
    translate(goalPos.x, goalPos.y);
    fill(255, 250, 180, 160 + sin(frameCount * 0.1) * 40);
    noStroke();
    rect(10, 10, goalPos.w - 20, goalPos.h - 10, 30, 30, 0, 0);
    
    fill(230, 225, 210);
    stroke(160, 155, 140);
    strokeWeight(2);
    rect(0, 0, 14, goalPos.h); 
    rect(goalPos.w - 14, 0, 14, goalPos.h); 
    arc(goalPos.w/2, 10, goalPos.w, 35, PI, TWO_PI); 
    pop();

    // Spawn-Logik
    if (!gameOver && totalTurtlesSpawned < maxTurtlesToSpawn) {
        spawnTimer++;
        if (spawnTimer > 30) {
            turtles.push({
                x: startPos.x,
                y: startPos.y - 15,
                vx: width > 600 ? 1.4 : 1.0, // Geschwindigkeit leicht angepasst für kleine Displays
                vy: 0,
                size: 18,
                isGrounded: true,
                bounceTimer: random(100)
            });
            totalTurtlesSpawned++;
            spawnTimer = 0;
        }
    }

    let allLines = drawnLines.slice();
    if (currentLine.length > 1) allLines.push(currentLine);

    // Brücken zeichnen
    stroke(255, 140, 0, 150); 
    strokeWeight(12);
    strokeJoin(ROUND);
    strokeCap(ROUND);
    noFill();
    for (let linePoints of allLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }
    
    stroke(255, 230, 100); 
    strokeWeight(5);
    for (let linePoints of allLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }

    // Schildkröten Logik
    for (let i = turtles.length - 1; i >= 0; i--) {
        let t = turtles[i];
        if (!t.isGrounded) t.vy += 0.25; 
        else t.vy = 0;
        
        t.x += t.vx;
        t.y += t.vy;
        t.isGrounded = false; 
        
        for (let p of platforms) {
            if (t.x > p.x && t.x < p.x + p.w) {
                if (t.y + 8 >= p.y && t.y - t.vy + 8 <= p.y + 12) {
                    t.y = p.y - 8;
                    t.isGrounded = true;
                }
            }
        }
        
        for (let linePoints of allLines) {
            for (let j = 0; j < linePoints.length - 1; j++) {
                let p1 = linePoints[j];
                let p2 = linePoints[j+1];
                let minX = min(p1.x, p2.x);
                let maxX = max(p1.x, p2.x);
                
                if (t.x >= minX - 2 && t.x <= maxX + 2) {
                    let dx = p2.x - p1.x;
                    let lineY = abs(dx) < 0.1 ? min(p1.y, p2.y) : p1.y + ((t.x - p1.x) / dx) * (p2.y - p1.y);
                    
                    if (t.y + 8 >= lineY - 14 && t.y - t.vy + 8 <= lineY + 14) {
                        t.y = lineY - 8;
                        t.isGrounded = true;
                        t.vy = 0; 
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                        if (t.vx > 0 && p2.x < p1.x) angle += PI;
                        t.vx = cos(angle) * (width > 600 ? 1.4 : 1.0);
                    }
                }
            }
        }
        
        if (t.isGrounded && abs(t.vx) < 0.2) t.vx = width > 600 ? 1.4 : 1.0; 

        if (t.x > goalPos.x && t.x < goalPos.x + goalPos.w && t.y > goalPos.y && t.y < goalPos.y + goalPos.h) {
            savedCount++;
            turtles.splice(i, 1);
        } else if (t.y > height - 10) {
            turtles.splice(i, 1);
        }

        if (i < turtles.length && turtles[i] === t) {
            drawTurtle(t.x, t.y, t.size, t.vx, t.bounceTimer);
            t.bounceTimer += 0.15;
        }
    }

    checkGameStatus();
}

function drawTurtle(x, y, size, vx, timer) {
    push();
    translate(x, y);
    if (vx < 0) scale(-1, 1);
    
    let legWiggle = sin(timer * 2.5) * 2;
    fill(152, 251, 152);
    stroke(20, 80, 20);
    strokeWeight(1);
    rect(-size/3, 3 + legWiggle, 4, 5, 1);  
    rect(size/4, 3 - legWiggle, 4, 5, 1);   
    ellipse(size/2, -1, size * 0.4, size * 0.35);

    fill(34, 139, 34);
    arc(0, 3, size, size + 1, PI, TWO_PI); 
    pop();
}

function checkGameStatus() {
    if (savedCount >= turtlesNeeded && !gameOver) {
        if (currentLevel < totalLevels) {
            currentLevel++;
            loadLevel(currentLevel);
        } else {
            gameOver = true;
            document.getElementById("mainUI").classList.add("hidden");
        }
    } else if (turtles.length === 0 && totalTurtlesSpawned >= maxTurtlesToSpawn && savedCount < turtlesNeeded) {
        loadLevel(currentLevel);
    }
}

function drawWinScreen() {
    push();
    textAlign(CENTER, CENTER);
    fill(220, 90, 0);
    
    let responsiveText = width * 0.08;
    if(responsiveText > 40) responsiveText = 40;
    textSize(responsiveText);
    text("ALLES IST GUT! ☀️🐢", width / 2, height * 0.45);
    
    textSize(16);
    fill(30, 50, 80);
    text("Tippe oder klicke, um von vorn zu beginnen.", width / 2, height * 0.58);
    pop();
}

// Gemeinsame Logik für Touch- und Mauseingabe
function startDrawing(inputX, inputY) {
    if (gameOver) {
        currentLevel = 1;
        loadLevel(currentLevel);
        return;
    }
    currentLine = [{x: inputX, y: inputY}];
}

function keepDrawing(inputX, inputY) {
    if (gameOver || currentLine.length === 0) return;
    let lastPt = currentLine[currentLine.length - 1];
    if (dist(inputX, inputY, lastPt.x, lastPt.y) > 8) {
        currentLine.push({x: inputX, y: inputY});
    }
}

function stopDrawing() {
    if (gameOver) return;
    if (currentLine.length > 1) drawnLines.push(currentLine);
    currentLine = [];
}

// Maus-Events
function mousePressed() { startDrawing(mouseX, mouseY); }
function mouseDragged() { keepDrawing(mouseX, mouseY); }
function mouseReleased() { stopDrawing(); }

// Touch-Events fürs Smartphone
function touchStarted() {
    if (touches.length > 0) startDrawing(touches[0].x, touches[0].y);
    return false;
}
function touchMoved() {
    if (touches.length > 0) keepDrawing(touches[0].x, touches[0].y);
    return false;
}
function touchEnded() { stopDrawing(); return false; }

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    generateHills();
    sunPos = { x: width - 100, y: 100 };
    if (!gameOver) loadLevel(currentLevel);
}
</script>

</body>
</html>
