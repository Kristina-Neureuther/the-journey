<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Journey - A Summer Adventure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #2c3e50;
            font-size: 0.85rem;
            letter-spacing: 1px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0px 2px 10px rgba(255, 255, 255, 0.9);
            padding: 0 10px;
            box-sizing: border-box;
        }

        .game-title {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #1a2b4c;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .highlight {
            color: #d35400;
            font-weight: bold;
            text-shadow: 0px 0px 5px rgba(255, 200, 0, 0.5);
        }

        .level-indicator {
            color: #0066cc;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 600px) {
            .ui-container { font-size: 1rem; line-height: 1.6; }
            .game-title { font-size: 2rem; letter-spacing: 6px; margin-bottom: 4px; }
            .level-indicator { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<div class="ui-container" id="mainUI">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    <span class="highlight">KLICKE & ZIEHE</span> / Wische, um goldene Brücken zu bauen. Bring die Schildkröte ans Ziel.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
let turtlesNeeded = 1;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 1;
let gameOver = false;

let clouds = [];
let hillsBackground = [];
let hillsForeground = [];
let particles = [];
let sunPos;

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 75, h: 85};

function setup() {
    createCanvas(windowWidth, windowHeight);
    sunPos = { x: width - 100, y: 100 };
    
    for(let i = 0; i < 5; i++) {
        clouds.push({
            x: random(width), y: random(height * 0.3), 
            size: random(60, 120), speed: random(0.1, 0.2)
        });
    }
    
    for(let i = 0; i < 25; i++) {
        particles.push({
            x: random(width), y: random(height),
            size: random(2, 4), speed: random(0.4, 1.2), angle: random(TWO_PI)
        });
    }

    loadLevel(currentLevel);
}

function generateHills() {
    hillsBackground = [];
    hillsForeground = [];
    let yOff1 = 0;
    let yOff2 = 100;
    for(let x = 0; x <= width + 100; x += 40) {
        hillsBackground.push({ x: x, y: height - 100 - noise(yOff1) * 100 });
        hillsForeground.push({ x: x, y: height - 40 - noise(yOff2) * 60 });
        yOff1 += 0.05; 
        yOff2 += 0.06;
    }
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    document.getElementById("mainUI").classList.remove("hidden");
    generateHills();
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    let isMobile = width < 600;
    
    // Dynamic offsets based on screen width to prevent elements from going off-screen
    let startXOffset = isMobile ? 20 : 150;
    let goalXOffset = isMobile ? width - 85 : width - 240; 
    
    let platH = isMobile ? 30 : 40;

    if (lvl === 1) {
        startPos = { x: startXOffset + 30, y: height * 0.35 };
        goalPos = { x: goalXOffset, y: height * 0.6, w: 65, h: 75 };
        platforms = [
            { x: startXOffset, y: height * 0.35, w: isMobile ? 80 : 160, h: platH }, 
            { x: goalXOffset - 20, y: height * 0.6 + 75, w: isMobile ? 100 : 150, h: platH } 
        ];
    } else if (lvl === 2) {
        startPos = { x: startXOffset + 30, y: height * 0.28 };
        goalPos = { x: goalXOffset, y: height * 0.22, w: 65, h: 75 };
        platforms = [
            { x: startXOffset, y: height * 0.28, w: isMobile ? 80 : 140, h: platH }, 
            { x: width / 2 - (isMobile ? 40 : 75), y: height * 0.65, w: isMobile ? 80 : 150, h: platH }, 
            { x: goalXOffset - 10, y: height * 0.22 + 75, w: isMobile ? 80 : 130, h: platH } 
        ];
    } else if (lvl === 3) {
        startPos = { x: startXOffset + 30, y: height * 0.22 };
        goalPos = { x: width / 2 - 32, y: height - (isMobile ? 130 : 170), w: 65, h: 75 };
        platforms = [
            { x: startXOffset, y: height * 0.22, w: isMobile ? 80 : 130, h: platH }, 
            { x: width - startXOffset - (isMobile ? 100 : 160), y: height * 0.45, w: isMobile ? 90 : 130, h: platH }, 
            { x: startXOffset + 10, y: height * 0.68, w: isMobile ? 90 : 130, h: platH }, 
            { x: width / 2 - (isMobile ? 50 : 80), y: height - (isMobile ? 55 : 100), w: isMobile ? 100 : 160, h: platH } 
        ];
    }
}

function drawGradientShape(points, colorTop, colorBottom) {
    let grad = drawingContext.createLinearGradient(0, height - 200, 0, height);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBottom);
    drawingContext.fillStyle = grad;
    
    beginShape();
    vertex(0, height);
    for(let p of points) vertex(p.x, p.y);
    vertex(width, height);
    endShape(CLOSE);
}

function draw() {
    let skyGrad = drawingContext.createLinearGradient(0, 0, 0, height);
    skyGrad.addColorStop(0, "#3a9ced"); 
    skyGrad.addColorStop(1, "#cce9ff"); 
    drawingContext.fillStyle = skyGrad;
    drawingContext.fillRect(0, 0, width, height);

    if (gameOver) {
        drawWinScreen();
        return; 
    }

    noStroke();
    for (let i = 0; i < 4; i++) {

        arc(sunPos.x, sunPos.y, 500 + i * 300, 500 + i * 300, PI/2, PI);
    }
