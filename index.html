<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey - A Beautiful Summer Puzzle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: #2c3e50;
            font-size: 1rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0px 2px 10px rgba(255, 255, 255, 0.9);
        }

        .game-title {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 6px;
            color: #1a2b4c;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .highlight {
            color: #d35400;
            font-weight: bold;
            text-shadow: 0px 0px 5px rgba(255, 200, 0, 0.5);
        }

        .level-indicator {
            color: #0066cc;
            font-weight: bold;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <span class="game-title">The Journey</span>
    <span class="level-indicator" id="levelTxt">LEVEL 1 / 3</span><br>
    <span class="highlight">KLICKE & ZIEHE</span>, um magische Brücken zu zeichnen und die Schildkröte nach Hause zu leiten.
</div>

<script>
let currentLevel = 1;
let totalLevels = 3;
let turtles = [];
let drawnLines = [];
let currentLine = [];
let spawnTimer = 0;
let savedCount = 0;
// Nur noch EINE Schildkröte pro Level
let turtlesNeeded = 1;
let totalTurtlesSpawned = 0;
let maxTurtlesToSpawn = 1;
let gameOver = false;

// Umgebungs-Elemente
let clouds = [];
let hillsBackground = [];
let hillsForeground = [];
let particles = [];
let sunPos;

let platforms = [];
let startPos = {x: 0, y: 0};
let goalPos = {x: 0, y: 0, w: 75, h: 85};

function setup() {
    createCanvas(windowWidth, windowHeight);
    sunPos = { x: width - 150, y: 120 };
    
    for(let i = 0; i < 6; i++) {
        clouds.push({
            x: random(width), y: random(height * 0.4), 
            size: random(80, 160), speed: random(0.1, 0.25)
        });
    }
    
    for(let i = 0; i < 40; i++) {
        particles.push({
            x: random(width), y: random(height),
            size: random(2, 5), speed: random(0.5, 1.5), angle: random(TWO_PI)
        });
    }

    loadLevel(currentLevel);
}

function generateHills() {
    hillsBackground = [];
    hillsForeground = [];
    let yOff1 = 0;
    let yOff2 = 100;
    for(let x = 0; x <= width + 100; x += 40) {
        hillsBackground.push({ x: x, y: height - 120 - noise(yOff1) * 140 });
        hillsForeground.push({ x: x, y: height - 40 - noise(yOff2) * 80 });
        yOff1 += 0.05; 
        yOff2 += 0.06;
    }
}

function loadLevel(lvl) {
    drawnLines = [];
    turtles = [];
    currentLine = [];
    spawnTimer = 0;
    savedCount = 0;
    totalTurtlesSpawned = 0;
    gameOver = false;
    
    generateHills();
    document.getElementById("levelTxt").innerText = `LEVEL ${lvl} / ${totalLevels}`;
    
    if (lvl === 1) {
        startPos = { x: 150, y: 250 };
        goalPos = { x: width - 240, y: 390, w: 75, h: 85 };
        platforms = [
            { x: 40, y: 250, w: 220, h: 45 }, 
            { x: width - 300, y: 475, w: 260, h: 45 } 
        ];
    } else if (lvl === 2) {
        startPos = { x: 150, y: 200 };
        goalPos = { x: width - 240, y: 150, w: 75, h: 85 };
        platforms = [
            { x: 40, y: 200, w: 200, h: 45 }, 
            { x: width/2 - 120, y: 440, w: 240, h: 45 }, 
            { x: width - 280, y: 235, w: 200, h: 45 } 
        ];
    } else if (lvl === 3) {
        startPos = { x: 120, y: 180 };
        goalPos = { x: width / 2 - 37, y: height - 220, w: 75, h: 85 };
        platforms = [
            { x: 40, y: 180, w: 180, h: 45 }, 
            { x: width - 280, y: 320, w: 220, h: 45 }, 
            { x: 80, y: 500, w: 220, h: 45 }, 
            { x: width / 2 - 130, y: height - 135, w: 260, h: 45 } 
        ];
    }
}

function drawGradientShape(points, colorTop, colorBottom) {
    let grad = drawingContext.createLinearGradient(0, height - 300, 0, height);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBottom);
    drawingContext.fillStyle = grad;
    
    beginShape();
    vertex(0, height);
    for(let p of points) vertex(p.x, p.y);
    vertex(width, height);
    endShape(CLOSE);
}

function draw() {
    // 1. Himmel
    let skyGrad = drawingContext.createLinearGradient(0, 0, 0, height);
    skyGrad.addColorStop(0, "#3a9ced"); 
    skyGrad.addColorStop(1, "#cce9ff"); 
    drawingContext.fillStyle = skyGrad;
    drawingContext.fillRect(0, 0, width, height);

    // 2. Sonne & Lichtstrahlen
    noStroke();
    for (let i = 0; i < 5; i++) {
        fill(255, 240, 150, 15 - i * 2);
        arc(sunPos.x, sunPos.y, 800 + i * 400, 800 + i * 400, PI/2, PI);
    }
    drawingContext.shadowBlur = 60;
    drawingContext.shadowColor = color(255, 230, 100);
    fill(255, 240, 120);
    ellipse(sunPos.x, sunPos.y, 110, 110);
    fill(255, 255, 200);
    ellipse(sunPos.x, sunPos.y, 80, 80);
    drawingContext.shadowBlur = 0;

    // 3. Wolken
    fill(255, 255, 255, 230);
    for(let c of clouds) {
        c.x -= c.speed;
        if(c.x < -c.size * 2) c.x = width + c.size;
        ellipse(c.x, c.y, c.size, c.size * 0.5);
        ellipse(c.x - c.size * 0.3, c.y - c.size * 0.1, c.size * 0.6, c.size * 0.4);
        ellipse(c.x + c.size * 0.3, c.y - c.size * 0.15, c.size * 0.7, c.size * 0.5);
    }

    // 4. Hügel mit Gradients
    drawGradientShape(hillsBackground, "#6dc971", "#429345");
    drawGradientShape(hillsForeground, "#88e053", "#51a31d");

    // 5. Wasser am unteren Rand
    fill(0, 150, 255, 120);
    rect(0, height - 30, width, 30);
    fill(255, 255, 255, 60);
    for(let i = 0; i < width; i+= 60) {
        ellipse(i + (frameCount * 0.5) % 60, height - 15 + sin(frameCount * 0.05 + i) * 5, 40, 4);
    }

    // 6. Sommer-Pollen (Partikel)
    fill(255, 255, 255, 180);
    for(let p of particles) {
        p.x += cos(p.angle) * p.speed - 0.5;
        p.y += sin(p.angle) * p.speed + 0.5;
        p.angle += random(-0.05, 0.05);
        if(p.y > height) { p.y = -10; p.x = random(width); }
        if(p.x < 0) { p.x = width + 10; }
        ellipse(p.x, p.y, p.size);
    }

    // --- PLATTFORMEN (Inseln) ---
    for (let p of platforms) {
        drawingContext.shadowBlur = 15;
        drawingContext.shadowColor = 'rgba(0,0,0,0.3)';
        fill(120, 80, 50); // Erde
        stroke(90, 50, 30);
        strokeWeight(2);
        rect(p.x, p.y, p.w, p.h, 6, 6, 20, 20);
        drawingContext.shadowBlur = 0;
        
        // Gras
        fill(100, 200, 60);
        noStroke();
        rect(p.x, p.y - 3, p.w, 16, 6, 6, 0, 0);
        
        // Dicke Ranken
        stroke(80, 170, 50);
        strokeWeight(5);
        strokeCap(ROUND);
        line(p.x + 20, p.y + 13, p.x + 20, p.y + 35);
        line(p.x + 40, p.y + 13, p.x + 40, p.y + 25);
        line(p.x + p.w - 30, p.y + 13, p.x + p.w - 30, p.y + 40);
    }
    
    // --- START-PORTAL ---
    drawingContext.shadowBlur = 20;
    drawingContext.shadowColor = color(255, 220, 50);
    noFill();
    stroke(255, 220, 50, 220);
    strokeWeight(5);
    ellipse(startPos.x, startPos.y - 12, 45, 65);
    fill(255, 220, 50, 80);
    noStroke();
    ellipse(startPos.x, startPos.y - 12, 35, 55);
    drawingContext.shadowBlur = 0; 

    // --- ZIEL-HAUS (Torbogen) ---
    push();
    translate(goalPos.x, goalPos.y);
    drawingContext.shadowBlur = 25;
    drawingContext.shadowColor = color(255, 255, 200);
    fill(255, 250, 180, 160 + sin(frameCount * 0.1) * 60);
    noStroke();
    rect(12, 12, goalPos.w - 24, goalPos.h - 12, 40, 40, 0, 0);
    drawingContext.shadowBlur = 0;
    
    fill(230, 225, 210);
    stroke(160, 155, 140);
    strokeWeight(3);
    rect(0, 0, 18, goalPos.h); 
    rect(goalPos.w - 18, 0, 18, goalPos.h); 
    arc(goalPos.w/2, 10, goalPos.w, 45, PI, TWO_PI); 
    pop();

    // --- SPAWN LOGIK (Spawnt sofort nach kurzem Moment) ---
    if (!gameOver && totalTurtlesSpawned < maxTurtlesToSpawn) {
        spawnTimer++;
        if (spawnTimer > 30) { // Spawnt jetzt deutlich schneller
            turtles.push({
                x: startPos.x,
                y: startPos.y - 15,
                vx: 1.4,
                vy: 0,
                size: 22,
                isGrounded: true,
                bounceTimer: random(100)
            });
            totalTurtlesSpawned++;
            spawnTimer = 0;
        }
    }

    // --- ALLE LINIEN ZUSAMMENFASSEN FÜR GRAFIK & KOLLISION ---
    // Hier kombinieren wir fertige Linien und die aktuell gezeichnete Linie
    let allLines = drawnLines.slice();
    if (currentLine.length > 1) {
        allLines.push(currentLine);
    }

    // --- DICKE GEZEICHNETE BRÜCKEN (Alle sehen exakt gleich aus!) ---
    // 1. Äußerer Glow (Weich)
    drawingContext.shadowBlur = 15;
    drawingContext.shadowColor = color(255, 100, 0);
    stroke(255, 140, 0, 150); 
    strokeWeight(16);
    strokeJoin(ROUND);
    strokeCap(ROUND);
    noFill();
    for (let linePoints of allLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }
    
    // 2. Innerer Kern (Hell)
    drawingContext.shadowBlur = 0;
    stroke(255, 230, 100); 
    strokeWeight(6);
    for (let linePoints of allLines) {
        beginShape();
        for (let pt of linePoints) vertex(pt.x, pt.y);
        endShape();
    }

    // --- SCHILDKRÖTEN LOGIK ---
    for (let i = turtles.length - 1; i >= 0; i--) {
        let t = turtles[i];
        
        if (!t.isGrounded) t.vy += 0.3; // Schwerkraft
        else t.vy = 0;
        
        t.x += t.vx;
        t.y += t.vy;
        t.isGrounded = false; 
        
        // Plattform Kollision
        for (let p of platforms) {
            if (t.x > p.x && t.x < p.x + p.w) {
                if (t.y + 10 >= p.y && t.y - t.vy + 10 <= p.y + 15) {
                    t.y = p.y - 10;
                    t.isGrounded = true;
                }
            }
        }
        
        // Brücken Kollision (Gilt jetzt auch für die Linie, die DU GERADE ZEICHNEST)
        for (let linePoints of allLines) {
            for (let j = 0; j < linePoints.length - 1; j++) {
                let p1 = linePoints[j];
                let p2 = linePoints[j+1];
                let minX = min(p1.x, p2.x);
                let maxX = max(p1.x, p2.x);
                
                if (t.x >= minX - 2 && t.x <= maxX + 2) {
                    let dx = p2.x - p1.x;
                    let lineY;
                    if (abs(dx) < 0.1) {
                        lineY = min(p1.y, p2.y);
                    } else {
                        let ratio = (t.x - p1.x) / dx;
                        lineY = p1.y + ratio * (p2.y - p1.y);
                    }
                    
                    if (t.y + 10 >= lineY - 18 && t.y - t.vy + 10 <= lineY + 18) {
                        t.y = lineY - 10;
                        t.isGrounded = true;
                        t.vy = 0; 
                        
                        let angle = atan2(p2.y - p1.y, p2.x - p1.x);
                        if (t.vx > 0 && p2.x < p1.x) angle += PI;
                        t.vx = cos(angle) * 1.4;
                    }
                }
            }
        }
        
        if (t.isGrounded && abs(t.vx) < 0.2) t.vx = 1.4; 

        // Ziel-Erkennung
        if (t.x > goalPos.x && t.x < goalPos.x + goalPos.w && t.y > goalPos.y && t.y < goalPos.y + goalPos.h) {
            savedCount++;
            turtles.splice(i, 1);
            continue;
        }
        
        // Absturz ins Wasser -> Level Neustart!
        if (t.y > height - 10) {
            turtles.splice(i, 1);
            continue;
        }

        drawTurtle(t.x, t.y, t.size, t.vx, t.bounceTimer);
        t.bounceTimer += 0.15;
    }

    checkGameStatus();
}

function drawTurtle(x, y, size, vx, timer) {
    push();
    translate(x, y);
    if (vx < 0) scale(-1, 1);
    
    let legWiggle = sin(timer * 2.5) * 3;
    let headWobble = cos(timer * 1.5) * 2;

    let shellColor = color(34, 139, 34);
    let skinColor = color(152, 251, 152);

    fill(skinColor);
    stroke(20, 80, 20);
    strokeWeight(1.5);
    rect(-size/3, 4 + legWiggle, 5, 6, 2);  
    rect(size/4, 4 - legWiggle, 5, 6, 2);   
    rect(-size/5, 4 - legWiggle, 5, 6, 2);  
    rect(size/6, 4 + legWiggle, 5, 6, 2);   

    ellipse(size/2 + headWobble, -2, size * 0.45, size * 0.4);
    fill(0);
    noStroke();
    ellipse(size/2 + 4 + headWobble, -4, 3, 3); 

    fill(shellColor);
    stroke(20, 60, 20);
    strokeWeight(2);
    arc(0, 4, size, size + 2, PI, TWO_PI); 

    stroke(120, 220, 120, 180);
    strokeWeight(1.5);
    noFill();
    arc(0, 4, size * 0.6, size * 0.6, PI, TWO_PI);
    line(-size/4, 0, -size/8, -size/4);
    line(size/4, 0, size/8, -size/4);

    pop();
}

function checkGameStatus() {
    if (savedCount >= turtlesNeeded && !gameOver) {
        if (currentLevel < totalLevels) {
            currentLevel++;
            loadLevel(currentLevel);
        } else {
            gameOver = true;
            drawWinScreen();
        }
    } else if (turtles.length === 0 && totalTurtlesSpawned >= maxTurtlesToSpawn && savedCount < turtlesNeeded) {
        // Schildkröte ist abgestürzt: Startet das Level sofort neu
        loadLevel(currentLevel);
    }
}

function drawWinScreen() {
    push();
    textAlign(CENTER, CENTER);
    
    drawingContext.shadowBlur = 15;
    drawingContext.shadowColor = color(255, 255, 255);
    fill(220, 90, 0);
    textSize(36);
    text("DIE REISE IST VOLLENDET! ☀️🐢", width / 2, height * 0.45);
    
    drawingContext.shadowBlur = 0;
    textSize(20);
    fill(30, 50, 80);
    text("Die Schildkröte hat durch deine Brücken sicher nach Hause gefunden.", width / 2, height * 0.53);
    text("Klicke irgendwo hin, um von vorn zu beginnen.", width / 2, height * 0.59);
    pop();
}

function mousePressed() {
    if (gameOver) {
        currentLevel = 1;
        loadLevel(currentLevel);
        return;
    }
    currentLine = [];
    currentLine.push({x: mouseX, y: mouseY});
}

function mouseDragged() {
    if (gameOver) return;
    let lastPt = currentLine[currentLine.length - 1];
    if (!lastPt || dist(mouseX, mouseY, lastPt.x, lastPt.y) > 10) {
        currentLine.push({x: mouseX, y: mouseY});
    }
}

function mouseReleased() {
    if (gameOver) return;
    if (currentLine.length > 1) {
        drawnLines.push(currentLine);
    }
    currentLine = [];
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    generateHills();
    sunPos = { x: width - 150, y: 120 };
}
</script>

</body>
</html>
